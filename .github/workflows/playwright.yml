name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      grep:
        description: 'Tag filter (e.g. @smoke, @regression, @negative)'
        required: false
        default: ''

# Allow deploying the Allure report to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox

      - name: Install browser system dependencies (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox

      - name: Run tests
        run: |
          if [ -n "${{ github.event.inputs.grep }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.grep }}"
          else
            npm test
          fi
        env:
          CI: true
          EBAY_EMAIL: ${{ secrets.EBAY_EMAIL }}
          EBAY_PASSWORD: ${{ secrets.EBAY_PASSWORD }}

      - name: Upload failed screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-screenshots-${{ github.run_id }}
          path: test-results/**/test-failed-*.png
          retention-days: 7

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report to Pages
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: allure-report/

  deploy-report:
    needs: test
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
